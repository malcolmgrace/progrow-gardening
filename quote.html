    <link rel="canonical" href="https://progrowgardening.ca/quote.html" />

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@500;600;700&family=Open+Sans:wght@400;500&display=swap" rel="stylesheet" />

    <!-- Icon Font Stylesheet -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet" />

    <!-- Libraries Stylesheet -->
    <link href="lib/animate/animate.min.css" rel="stylesheet" />
    <link href="lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet" />

    <!-- Customized Bootstrap Stylesheet -->
    <link href="css/bootstrap.min.css" rel="stylesheet" />

    <!-- Template Stylesheet -->
    <link href="css/style.css" rel="stylesheet" />

    <style>
      .service-page-header {
        background: linear-gradient(135deg, var(--dark) 0%, var(--primary) 100%);
        padding: 3.5rem 0 3rem;
      }
      .service-page-header h1 {
        color: #fff;
        font-size: clamp(1.8rem, 4vw, 2.6rem);
      }
      .service-page-header .breadcrumb-item,
      .service-page-header .breadcrumb-item a,
      .service-page-header .breadcrumb-item.active {
        color: rgba(255,255,255,0.75);
        text-decoration: none;
      }
      .service-page-header .breadcrumb-item + .breadcrumb-item::before {
        color: rgba(255,255,255,0.4);
      }
    </style>
  </head>

  <body>
    <!-- Spinner Start -->
    <div id="spinner" class="show bg-white position-fixed translate-middle w-100 vh-100 top-50 start-50 d-flex align-items-center justify-content-center">
      <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem"></div>
    </div>
    <!-- Spinner End -->

    <!-- Topbar Start -->
    <div id="topbar-placeholder"></div>
    <!-- Topbar End -->

    <!-- Navbar Start -->
    <div id="navbar-placeholder"></div>

    <main>

      <!-- Page Header Start -->
      <div class="service-page-header">
        <div class="container">
          <div class="wow fadeInUp" data-wow-delay="0.1s">
            <h1 class="mb-2">Request a Free Quote</h1>
            <nav aria-label="breadcrumb">
              <ol class="breadcrumb mb-0">
                <li class="breadcrumb-item"><a href="index.html">Home</a></li>
                <li class="breadcrumb-item active" aria-current="page">Get a Quote</li>
              </ol>
            </nav>
          </div>
        </div>
      </div>
      <!-- Page Header End -->

      <!-- Quote Form Start -->
      <div class="container-fluid quote my-0 py-5" data-parallax="scroll" data-image-src="img/carousel-quote-page.jpg">
        <div class="container py-5">
          <div class="row justify-content-center">
            <div class="col-lg-7">
              <div class="bg-white rounded p-4 p-sm-5 wow fadeIn" data-wow-delay="0.5s">
                <h2 class="text-center mb-3"><strong>Get a Free, No-Obligation Quote</strong></h2>
                <hr />
                <p class="text-center mb-4">Fill out the form and we will get back to you within one business day to discuss your needs.</p>
                <form name="gardening-quote" method="POST" action="/thank-you" netlify netlify-honeypot="bot-field">
                  <input type="hidden" name="bot-field" />
                  <input type="hidden" name="form-name" value="gardening-quote" />
                  <div class="row g-3">
                    <div class="col-sm-6">
                      <div class="form-floating">
                        <input type="text" class="form-control bg-light border-0" id="gname" name="name" placeholder="Name" required />
                        <label for="gname">Name</label>
                      </div>
                    </div>
                    <div class="col-sm-6">
                      <div class="form-floating">
                        <input type="email" class="form-control bg-light border-0" id="gmail" name="email" placeholder="Email" required />
                        <label for="gmail">Email</label>
                      </div>
                    </div>
                    <div class="col-sm-6">
                      <div class="form-floating">
                        <input type="tel" class="form-control bg-light border-0" id="cname" name="phone" placeholder="Phone Number" required />
                        <label for="cname">Phone Number</label>
                      </div>
                    </div>
                    <div class="col-sm-6">
                      <div class="form-floating">
                        <select class="form-control bg-light border-0" id="cage" name="service-type" required>
                          <option value="">Select</option>
                          <option value="garden-maintenance">Garden Maintenance</option>
                          <option value="weed-control">Weed Control</option>
                          <option value="lawn-restoration">Lawn Restoration</option>
                          <option value="garden-design">Garden Design</option>
                          <option value="planting">Planting</option>
                          <option value="shrub-tree-trimming">Shrub &amp; Tree Trimming</option>
                          <option value="other">Other</option>
                        </select>
                        <label for="cage">Service Type</label>
                      </div>
                    </div>
                    <div class="col-12">
                      <div class="form-floating">
                        <textarea class="form-control bg-light border-0" placeholder="Leave a message here" id="message" name="message" style="height: 100px" required></textarea>
                        <label for="message">Message</label>
                      </div>
                    </div>
                    <div class="col-12 text-center">
                      <button class="btn btn-primary py-3 px-4" type="submit">Submit Now</button>
                    </div>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- Quote Form End -->

    </main>

    <!-- Footer Start -->
    <div id="footer-placeholder"></div>
    <!-- Footer End -->

    <!-- JavaScript Libraries -->
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="lib/wow/wow.min.js" defer></script>
    <script src="lib/easing/easing.min.js" defer></script>
    <script src="lib/waypoints/waypoints.min.js" defer></script>
    <script src="lib/owlcarousel/owl.carousel.min.js" defer></script>
    <script src="lib/counterup/counterup.min.js" defer></script>
    <script src="js/main.js" defer></script>
    <script src="js/components.js" defer></script>
  </body>
</html>
